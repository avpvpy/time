<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التاريخ</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F0EDE8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cairo', sans-serif;
  }

  .widget {
    width: 320px;
    background: #fff;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
  }

  .hijri {
    background: #1A1A2E;
    padding: 32px 24px;
    text-align: center;
  }

  .label {
    font-size: 11px;
    letter-spacing: 3px;
    font-weight: 300;
    margin-bottom: 16px;
  }

  .hijri .label { color: rgba(255,255,255,0.45); }

  .h-date {
    font-size: 52px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
    letter-spacing: -2px;
    direction: ltr;
  }

  .h-date .sep { color: #C9A96E; font-weight: 300; }

  .h-suffix {
    font-size: 13px;
    color: rgba(255,255,255,0.35);
    font-weight: 300;
    margin-top: 8px;
  }

  .divider { height: 1px; background: #EDEAE5; }

  .gregorian {
    padding: 32px 24px;
    text-align: center;
    background: #fff;
  }

  .gregorian .label { color: #BBBAB5; margin-bottom: 16px; }

  .greg-date {
    font-size: 52px;
    font-weight: 700;
    color: #1A1A2E;
    letter-spacing: -2px;
    line-height: 1;
    direction: ltr;
  }

  .greg-date .sep { color: #BBBAB5; font-weight: 300; }

  .bottom-bar {
    background: #F7F6F3;
    border-top: 1px solid #EDEAE5;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .day-name { font-size: 13px; color: #888; font-weight: 400; }

  .time {
    font-size: 13px;
    color: #1A1A2E;
    font-weight: 600;
    direction: ltr;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<div class="widget">

  <div class="hijri">
    <div class="label">التاريخ الهجري</div>
    <div class="h-date" id="hDate">----/--/--</div>
    <div class="h-suffix">هـ</div>
  </div>

  <div class="divider"></div>

  <div class="gregorian">
    <div class="label">التاريخ الميلادي</div>
    <div class="greg-date" id="gDate">----/--/--</div>
  </div>

  <div class="bottom-bar">
    <div class="day-name" id="dayName"></div>
    <div class="time" id="clock"></div>
  </div>

</div>

<script>
  const days = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

  // Use browser's built-in Intl for accurate Hijri conversion
  const hijriFmt = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {
    year: 'numeric', month: 'numeric', day: 'numeric'
  });

  function getHijri(date) {
    const parts = hijriFmt.formatToParts(date);
    const get = t => parseInt(parts.find(p => p.type === t).value);
    return { y: get('year'), m: get('month'), d: get('day') };
  }

  function pad(n){ return String(n).padStart(2,'0'); }

  function update() {
    const now = new Date();
    const h = getHijri(now);

    document.getElementById('hDate').innerHTML =
      h.y + '<span class="sep">/</span>' + h.m + '<span class="sep">/</span>' + h.d;

    document.getElementById('gDate').innerHTML =
      now.getFullYear() + '<span class="sep">/</span>' + pad(now.getMonth()+1) + '<span class="sep">/</span>' + pad(now.getDate());

    document.getElementById('dayName').textContent = days[now.getDay()];

    const hr = now.getHours() % 12 || 12;
    document.getElementById('clock').textContent =
      pad(hr) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds()) + (now.getHours() >= 12 ? ' م' : ' ص');
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
